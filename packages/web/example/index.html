<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real QR Code — Web Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #0E121B; }
    .qr-container { position: relative; display: inline-block; }
    .logo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 48px;
    }
    .logo svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Real QR Code</h1>
    <div class="qr-container">
      <div id="qr"></div>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="#0E121B"/>
        </svg>
      </div>
    </div>
  </div>

  <script type="module">
    import { renderQrCode } from '../dist/index.js';

    renderQrCode(document.getElementById('qr'), {
      data: 'https://flutter.dev',
      size: 304,
      centerSpaceSize: 80,
      borderRadius: 16,
    });
  </script>
</body>
</html>
